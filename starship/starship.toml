# ══════════════════════════════════
#    Windows 95 Starship Theme
# ══════════════════════════════════

command_timeout = 500

format = """
[█](fg:#000066 bg:#000080)\
[$username](bold fg:#ffffff bg:#000080)\
[@](fg:#c0c0c0 bg:#000080)\
[$hostname](bold fg:#ffffff bg:#000080)\
[█](fg:#000080 bg:#1f5fa6)\
[$directory](bold fg:#ffffff bg:#1f5fa6)\
[█](fg:#1f5fa6 bg:#000066)\
[$git_branch$git_status](fg:#c0c0c0 bg:#000066)\
[█](fg:#000066 bg:#000080)\
[$python$nodejs$rust$c](fg:#c0c0c0 bg:#000080)\
[█](fg:#000080)\
$fill\
[$cmd_duration](fg:#808080)\
[$time](fg:#c0c0c0)\
\n[>](fg:#00ff00) """

[fill]
symbol = " "

[os]
disabled = false
format = "[$symbol ]($style)"
style = "fg:#c0c0c0 bg:#000066"

[os.symbols]
Linux = ""
Debian = ""
Windows = ""

[username]
format = "[$user]($style)"
style_user = "bold fg:#ffffff bg:#000080"
style_root = "bold fg:#ff0000 bg:#000080"
show_always = true

[hostname]
format = "[$hostname]($style)"
style = "bold fg:#ffffff bg:#000080"
ssh_only = false

[directory]
format = "[$path]($style)[$read_only]($read_only_style)"
style = "bold fg:#ffffff bg:#1f5fa6"
read_only = " 🔒"
read_only_style = "fg:#ff0000 bg:#1f5fa6"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "  [$symbol$branch]($style)"
symbol = ""
style = "fg:#c0c0c0 bg:#000066"

[git_status]
disabled = true

[python]
format = "[ $symbol$version]($style)"
symbol = " "
style = "fg:#c0c0c0 bg:#000080"

[nodejs]
disabled = true

[rust]
disabled = true

[c]
format = "[ $symbol$version]($style)"
symbol = " "
style = "fg:#c0c0c0 bg:#000080"

[time]
disabled = false
format = "[ $time ]($style)"
style = "fg:#c0c0c0"
time_format = "%H:%M"

[character]
success_symbol = "[>>](bold fg:#00ff00)"
error_symbol = "[>>](bold fg:#ff0000)"
